<div id="setup-view">
    <div style="background:#eee; padding:15px; border-radius:10px; margin-bottom:20px; display:flex; gap:10px;">
        <button onclick="exportLibrary()" style="flex:1; background:var(--s); color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">💾 Save My Voice to File</button>
        <button onclick="importLibrary()" style="flex:1; background:var(--p); color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">📤 Load Voice from File</button>
    </div>
    <button onclick="initMic()" style="background:var(--p); color:white; padding:18px; width:100%; border:none; border-radius:12px; font-weight:bold; margin-bottom:25px;">🎤 1. ENABLE MICROPHONE FIRST</button>
    <div class="sound-grid" id="master-board"></div>
</div>

<script>
// --- ADD THESE TWO FUNCTIONS TO YOUR SCRIPT SECTION ---
function exportLibrary() {
    db.transaction("sounds").objectStore("sounds").getAll().onsuccess = e => {
        const keys = [];
        db.transaction("sounds").objectStore("sounds").getAllKeys().onsuccess = k => {
            const data = {};
            k.target.result.forEach((key, i) => data[key] = e.target.result[i]);
            const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "broussard-academy-voice.json";
            a.click();
        };
    };
}

function importLibrary() {
    const input = document.createElement("input");
    input.type = "file";
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = f => {
            const data = JSON.parse(f.target.result);
            const tx = db.transaction("sounds", "readwrite");
            Object.entries(data).forEach(([k, v]) => tx.objectStore("sounds").put(v, k));
            tx.oncomplete = () => { alert("Voice Library Loaded!"); location.reload(); };
        };
        reader.readAsText(file);
    };
    input.click();
}
</script>
